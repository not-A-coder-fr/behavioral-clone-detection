<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silicon Sprint - Behavioral Clone Detection</title>

</head>
<body>

    <h2>🚀 Silicon Sprint - Behavioral Clone Detection</h2>

    <!-- Risk Meter -->
    <div class="meter-container">
    <div id="meter-bar"></div>
    </div>
    <p id="meter-label"></p>

</body>

<script src="/static/script.js"></script>
